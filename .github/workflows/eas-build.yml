name: EAS Build (Android APK)

# Disabled auto-trigger to avoid filling the free-tier Expo queue.
# Re-enable by uncommenting the `push:` block below and pushing.
# To trigger manually meanwhile: GitHub repo -> Actions -> "EAS Build" -> "Run workflow".
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'mobile/**'
  #     - '.github/workflows/eas-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Cloud build via EAS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install deps
        run: npm install

      - name: Ensure EAS project exists
        run: eas init --non-interactive --force

      - name: Trigger Android preview build
        run: eas build --platform android --profile preview --non-interactive --no-wait
